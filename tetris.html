<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tetris — Arcade Hub</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#05050f;display:flex;flex-direction:column;align-items:center;
     justify-content:center;min-height:100vh;font-family:'Courier New',monospace;
     color:#fff;overflow:hidden;user-select:none}
#backBtn{position:fixed;top:12px;left:12px;background:transparent;
         border:1px solid #f0f4;color:#f0f;font-size:11px;padding:6px 12px;
         cursor:pointer;letter-spacing:1px;z-index:100;transition:all .2s}
#backBtn:hover{background:#f0f1;border-color:#f0f}
#game{display:flex;gap:16px;align-items:flex-start}
/* Side panels */
.panel{width:100px;display:flex;flex-direction:column;gap:12px}
.panel.right{width:110px}
.box{background:#0a0a1a;border:1px solid #1a1a3e;padding:10px;border-radius:2px}
.box-title{font-size:8px;color:#888;letter-spacing:2px;margin-bottom:8px}
.box-val{font-size:13px;color:#f0f;text-shadow:0 0 8px #f0f;letter-spacing:1px}
.box-sub{font-size:8px;color:#555;margin-top:3px}
canvas{display:block;border:2px solid #1a1a3e;
       box-shadow:0 0 30px #f0f3,0 0 60px #f0f1}
#nextCanvas,#holdCanvas{display:block}
/* Overlay */
#ov{position:fixed;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    background:rgba(0,0,0,.88);z-index:50}
#ov h1{font-size:30px;color:#f0f;text-shadow:0 0 20px #f0f;
       margin-bottom:14px;letter-spacing:4px}
#ov p{color:#888;font-size:10px;line-height:2.4;text-align:center;margin-bottom:20px}
.sd{color:#f0f;font-size:15px;text-shadow:0 0 8px #f0f;margin-bottom:4px}
.bd{color:#f80;font-size:10px;margin-bottom:20px}
#ov button{background:transparent;border:2px solid #f0f;color:#f0f;
           font-family:'Courier New',monospace;font-size:13px;
           padding:10px 30px;cursor:pointer;letter-spacing:2px;margin:4px;transition:all .2s}
#ov button:hover{background:#f0f1}
.bm{border-color:#444!important;color:#555!important;
    font-size:10px!important;padding:7px 16px!important}
.bm:hover{color:#888!important;border-color:#888!important}
#controls{font-size:8px;color:#333;text-align:center;margin-top:8px;letter-spacing:1px;line-height:2}
</style>
</head>
<body>
<button id="backBtn" onclick="location.href='index.html'">◀ MENÚ</button>

<div id="game">
  <!-- Left panel -->
  <div class="panel">
    <div class="box">
      <div class="box-title">HOLD</div>
      <canvas id="holdCanvas" width="80" height="80"></canvas>
    </div>
    <div class="box">
      <div class="box-title">SCORE</div>
      <div class="box-val" id="scoreEl">0</div>
    </div>
    <div class="box">
      <div class="box-title">MEJOR</div>
      <div class="box-val" id="bestEl">0</div>
    </div>
  </div>

  <!-- Board -->
  <canvas id="c" width="240" height="480"></canvas>

  <!-- Right panel -->
  <div class="panel right">
    <div class="box">
      <div class="box-title">NEXT</div>
      <canvas id="nextCanvas" width="90" height="270"></canvas>
    </div>
    <div class="box">
      <div class="box-title">NIVEL</div>
      <div class="box-val" id="levelEl">1</div>
    </div>
    <div class="box">
      <div class="box-title">LÍNEAS</div>
      <div class="box-val" id="linesEl">0</div>
    </div>
  </div>
</div>

<div id="controls">
  ← → mover &nbsp;|&nbsp; ↑ rotar &nbsp;|&nbsp; ↓ bajar<br>
  SPACE caída &nbsp;|&nbsp; C hold &nbsp;|&nbsp; P pausa
</div>

<!-- Overlay -->
<div id="ov">
  <h1>TETRIS</h1>
  <p>
    ← → mover &nbsp;|&nbsp; ↑ rotar &nbsp;|&nbsp; ↓ bajar rápido<br>
    SPACE caída instantánea &nbsp;|&nbsp; C hold pieza<br>
    Completa líneas para sumar puntos<br>
    4 líneas a la vez = TETRIS (+800 pts)
  </p>
  <button id="startBtn">▶ INICIAR</button>
  <button class="bm" onclick="location.href='index.html'">◀ MENÚ PRINCIPAL</button>
</div>

<script>
// ── CONSTANTS ─────────────────────────────────────────
const COLS=10, ROWS=20, BS=24; // board cell size px
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const nextCvs=document.getElementById('nextCanvas');
const nCtx=nextCvs.getContext('2d');
const holdCvs=document.getElementById('holdCanvas');
const hCtx=holdCvs.getContext('2d');

// ── TETROMINOES ───────────────────────────────────────
// Each piece: array of 4 rotations, each rotation = array of [col,row] offsets
const PIECES = {
  I:{ color:'#0ff', shapes:[[[0,1],[1,1],[2,1],[3,1]],[[2,0],[2,1],[2,2],[2,3]],[[0,2],[1,2],[2,2],[3,2]],[[1,0],[1,1],[1,2],[1,3]]] },
  O:{ color:'#ff0', shapes:[[[1,0],[2,0],[1,1],[2,1]],[[1,0],[2,0],[1,1],[2,1]],[[1,0],[2,0],[1,1],[2,1]],[[1,0],[2,0],[1,1],[2,1]]] },
  T:{ color:'#a0f', shapes:[[[1,0],[0,1],[1,1],[2,1]],[[1,0],[1,1],[2,1],[1,2]],[[0,1],[1,1],[2,1],[1,2]],[[1,0],[0,1],[1,1],[1,2]]] },
  S:{ color:'#0f0', shapes:[[[1,0],[2,0],[0,1],[1,1]],[[1,0],[1,1],[2,1],[2,2]],[[1,1],[2,1],[0,2],[1,2]],[[0,0],[0,1],[1,1],[1,2]]] },
  Z:{ color:'#f00', shapes:[[[0,0],[1,0],[1,1],[2,1]],[[2,0],[1,1],[2,1],[1,2]],[[0,1],[1,1],[1,2],[2,2]],[[1,0],[0,1],[1,1],[0,2]]] },
  J:{ color:'#00f', shapes:[[[0,0],[0,1],[1,1],[2,1]],[[1,0],[2,0],[1,1],[1,2]],[[0,1],[1,1],[2,1],[2,2]],[[1,0],[1,1],[0,2],[1,2]]] },
  L:{ color:'#f80', shapes:[[[2,0],[0,1],[1,1],[2,1]],[[1,0],[1,1],[1,2],[2,2]],[[0,1],[1,1],[2,1],[0,2]],[[0,0],[1,0],[1,1],[1,2]]] },
};
const PIECE_KEYS=Object.keys(PIECES);

// Score table for 1-4 lines
const LINE_SCORES=[0,100,300,500,800];

// ── STATE ─────────────────────────────────────────────
let board, score, best, level, lines, running, paused;
let current, bag, nextQueue, held, holdUsed;
let dropTimer, dropInterval, lockTimer, lockDelay=500;
let frame, animLines=[], animTimer=0;

best=+localStorage.getItem('tt_best')||0;
document.getElementById('bestEl').textContent=best;

// ── INIT ──────────────────────────────────────────────
function initGame(){
  board=Array.from({length:ROWS},()=>Array(COLS).fill(null));
  score=0; level=1; lines=0; frame=0;
  animLines=[]; animTimer=0;
  bag=[]; nextQueue=[];
  held=null; holdUsed=false;
  dropTimer=0; dropInterval=levelInterval(1);
  lockTimer=null;
  running=true; paused=false;
  // fill next queue
  while(nextQueue.length<5) nextQueue.push(nextPiece());
  spawnPiece();
  updateHUD();
}

function levelInterval(lv){ return Math.max(50, 1000-((lv-1)*90)); }

// ── BAG RANDOMIZER ────────────────────────────────────
function refillBag(){ bag=[...PIECE_KEYS].sort(()=>Math.random()-.5); }
function nextPiece(){
  if(!bag.length) refillBag();
  return bag.pop();
}

// ── PIECE ─────────────────────────────────────────────
function makePiece(key){
  return { key, rot:0, col:3, row:0 };
}

function cells(p){
  return PIECES[p.key].shapes[p.rot].map(([c,r])=>[c+p.col, r+p.row]);
}

function valid(p, dc=0, dr=0, rot=p.rot){
  const tmp={...p, col:p.col+dc, row:p.row+dr, rot};
  return cells(tmp).every(([c,r])=>c>=0&&c<COLS&&r<ROWS&&(r<0||!board[r][c]));
}

function spawnPiece(){
  const key=nextQueue.shift();
  nextQueue.push(nextPiece());
  current=makePiece(key);
  holdUsed=false;
  if(!valid(current)){
    // game over
    endGame(); return;
  }
  startLockTimer();
}

// ── GHOST ─────────────────────────────────────────────
function ghostRow(){
  let dr=0;
  while(valid(current,0,dr+1)) dr++;
  return dr;
}

// ── LOCK TIMER ────────────────────────────────────────
function startLockTimer(){
  clearTimeout(lockTimer);
  if(!valid(current,0,1)){
    lockTimer=setTimeout(lockPiece, lockDelay);
  }
}

function lockPiece(){
  cells(current).forEach(([c,r])=>{
    if(r>=0) board[r][c]=PIECES[current.key].color;
  });
  clearLines();
  spawnPiece();
}

function clearLines(){
  const full=[];
  for(let r=0;r<ROWS;r++){
    if(board[r].every(c=>c!==null)) full.push(r);
  }
  if(!full.length) return;

  animLines=full; animTimer=12; // flash frames

  setTimeout(()=>{
    full.forEach(r=>{
      board.splice(r,1);
      board.unshift(Array(COLS).fill(null));
    });
    animLines=[];
    const n=full.length;
    score+=LINE_SCORES[n]*(level);
    lines+=n;
    level=Math.floor(lines/10)+1;
    dropInterval=levelInterval(level);
    if(score>best){best=score;localStorage.setItem('tt_best',best);}
    updateHUD();
  }, 120);
}

// ── INPUT ─────────────────────────────────────────────
const keys={};
window.addEventListener('keydown',e=>{
  if(!running) return;
  if(e.code==='KeyP'){ paused=!paused; return; }
  if(paused) return;
  switch(e.code){
    case 'ArrowLeft':  move(-1,0); break;
    case 'ArrowRight': move(1,0);  break;
    case 'ArrowDown':  move(0,1);  score+=1; updateHUD(); break;
    case 'ArrowUp':    rotate();   break;
    case 'KeyZ':       rotate(-1); break;
    case 'Space':      hardDrop(); e.preventDefault(); break;
    case 'KeyC':       holdPiece(); break;
  }
});

function move(dc,dr){
  if(valid(current,dc,dr)){
    current.col+=dc; current.row+=dr;
    startLockTimer();
  }
}

function rotate(dir=1){
  const newRot=((current.rot+dir)%4+4)%4;
  // wall kick offsets
  const kicks=[[0,0],[1,0],[-1,0],[0,-1],[2,0],[-2,0]];
  for(const [kc,kr] of kicks){
    if(valid(current,kc,kr,newRot)){
      current.col+=kc; current.row+=kr; current.rot=newRot;
      startLockTimer(); return;
    }
  }
}

function hardDrop(){
  const dr=ghostRow();
  score+=dr*2;
  current.row+=dr;
  lockPiece();
  updateHUD();
}

function holdPiece(){
  if(holdUsed) return;
  holdUsed=true;
  const key=current.key;
  if(held){
    current=makePiece(held);
  } else {
    spawnPiece();
  }
  held=key;
}

document.getElementById('startBtn').addEventListener('click',()=>{
  document.getElementById('ov').style.display='none';
  initGame();
});

// ── HUD ───────────────────────────────────────────────
function updateHUD(){
  document.getElementById('scoreEl').textContent=score;
  document.getElementById('bestEl').textContent=best;
  document.getElementById('levelEl').textContent=level;
  document.getElementById('linesEl').textContent=lines;
}

function endGame(){
  running=false;
  if(score>best){best=score;localStorage.setItem('tt_best',best);}
  const ov=document.getElementById('ov');
  ov.innerHTML=`<h1>GAME OVER</h1>
    <div class="sd">SCORE: ${score}</div>
    <div class="bd">MEJOR: ${best}</div>
    <button id="retryBtn">↺ REINTENTAR</button>
    <button class="bm" onclick="location.href='index.html'">◀ MENÚ PRINCIPAL</button>`;
  ov.style.display='flex';
  document.getElementById('retryBtn').addEventListener('click',()=>{
    ov.style.display='none'; initGame();
  });
}

// ── DRAW ──────────────────────────────────────────────
function drawBoard(){
  ctx.fillStyle='#05050f';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Grid lines
  ctx.strokeStyle='#0a0a20';
  ctx.lineWidth=1;
  for(let c=0;c<=COLS;c++){ctx.beginPath();ctx.moveTo(c*BS,0);ctx.lineTo(c*BS,ROWS*BS);ctx.stroke();}
  for(let r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*BS);ctx.lineTo(COLS*BS,r*BS);ctx.stroke();}

  // Placed cells
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(board[r][c]){
        // flash animation
        if(animLines.includes(r)){
          const t=animTimer/12;
          ctx.fillStyle=`rgba(255,255,255,${t})`;
        } else {
          ctx.fillStyle=board[r][c];
        }
        drawCell(ctx,c,r,board[r][c],animLines.includes(r));
      }
    }
  }

  if(!current) return;

  // Ghost piece
  const gdr=ghostRow();
  if(gdr>0){
    const gc=PIECES[current.key].color;
    cells(current).forEach(([c,r])=>{
      const gr=r+gdr;
      if(gr>=0&&gr<ROWS){
        ctx.globalAlpha=0.2;
        drawCell(ctx,c,gr,gc,false);
        ctx.globalAlpha=1;
      }
    });
  }

  // Active piece
  cells(current).forEach(([c,r])=>{
    if(r>=0) drawCell(ctx,c,r,PIECES[current.key].color,false);
  });
}

function drawCell(c2d,col,row,color,flash){
  const x=col*BS, y=row*BS;
  if(flash){
    c2d.fillStyle='#fff';
    c2d.fillRect(x+1,y+1,BS-2,BS-2);
    return;
  }
  // Fill
  c2d.fillStyle=color;
  c2d.fillRect(x+1,y+1,BS-2,BS-2);
  // Highlight top-left
  c2d.fillStyle='rgba(255,255,255,0.25)';
  c2d.fillRect(x+1,y+1,BS-2,4);
  c2d.fillRect(x+1,y+1,4,BS-2);
  // Shadow bottom-right
  c2d.fillStyle='rgba(0,0,0,0.35)';
  c2d.fillRect(x+1,y+BS-4,BS-2,3);
  c2d.fillRect(x+BS-4,y+1,3,BS-2);
  // Glow border
  c2d.shadowColor=color; c2d.shadowBlur=6;
  c2d.strokeStyle=color;
  c2d.lineWidth=0.5;
  c2d.strokeRect(x+1.5,y+1.5,BS-3,BS-3);
  c2d.shadowBlur=0;
}

function drawMini(c2d,cvs,key,cellSize=18){
  c2d.fillStyle='#05050f';
  c2d.fillRect(0,0,cvs.width,cvs.height);
  if(!key) return;
  const shape=PIECES[key].shapes[0];
  const color=PIECES[key].color;
  // center in canvas
  const minC=Math.min(...shape.map(([c])=>c));
  const maxC=Math.max(...shape.map(([c])=>c));
  const minR=Math.min(...shape.map(([,r])=>r));
  const maxR=Math.max(...shape.map(([,r])=>r));
  const pw=(maxC-minC+1)*cellSize, ph=(maxR-minR+1)*cellSize;
  const ox=(cvs.width-pw)/2-minC*cellSize;
  const oy=(cvs.height-ph)/2-minR*cellSize;
  shape.forEach(([c,r])=>{
    const x=c*cellSize+ox, y=r*cellSize+oy;
    c2d.fillStyle=color;
    c2d.fillRect(x+1,y+1,cellSize-2,cellSize-2);
    c2d.fillStyle='rgba(255,255,255,0.2)';
    c2d.fillRect(x+1,y+1,cellSize-2,3);
    c2d.shadowColor=color; c2d.shadowBlur=5;
    c2d.strokeStyle=color; c2d.lineWidth=0.5;
    c2d.strokeRect(x+1.5,y+1.5,cellSize-3,cellSize-3);
    c2d.shadowBlur=0;
  });
}

function drawNext(){
  nCtx.fillStyle='#05050f';
  nCtx.fillRect(0,0,nextCvs.width,nextCvs.height);
  const cs=16;
  nextQueue.slice(0,5).forEach((key,i)=>{
    const shape=PIECES[key].shapes[0];
    const color=PIECES[key].color;
    const oy=i*54+4;
    shape.forEach(([c,r])=>{
      const x=c*cs+8, y=r*cs+oy;
      nCtx.fillStyle=color;
      nCtx.fillRect(x+1,y+1,cs-2,cs-2);
      nCtx.fillStyle='rgba(255,255,255,0.2)';
      nCtx.fillRect(x+1,y+1,cs-2,3);
      nCtx.shadowColor=color; nCtx.shadowBlur=4;
      nCtx.strokeStyle=color; nCtx.lineWidth=0.5;
      nCtx.strokeRect(x+1.5,y+1.5,cs-3,cs-3);
      nCtx.shadowBlur=0;
    });
  });
}

// ── LOOP ──────────────────────────────────────────────
let lastTime=0;
function loop(ts){
  const dt=ts-lastTime; lastTime=ts;
  frame++;

  if(animTimer>0) animTimer--;

  if(running&&!paused&&current){
    dropTimer+=dt;
    if(dropTimer>=dropInterval){
      dropTimer=0;
      if(valid(current,0,1)){
        current.row++;
        startLockTimer();
      }
    }
  }

  drawBoard();
  drawNext();
  drawMini(hCtx,holdCvs,held);

  // Pause overlay on canvas
  if(paused){
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#f0f';
    ctx.font='bold 20px Courier New';
    ctx.textAlign='center';
    ctx.fillText('PAUSA',canvas.width/2,canvas.height/2);
    ctx.font='10px Courier New';
    ctx.fillStyle='#888';
    ctx.fillText('P para continuar',canvas.width/2,canvas.height/2+24);
    ctx.textAlign='left';
  }

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
