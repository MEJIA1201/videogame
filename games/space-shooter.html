<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Space Shooter — Arcade Hub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }
    #backBtn {
      position: fixed;
      top: 14px; left: 14px;
      background: transparent;
      border: 1px solid #0ff4;
      color: #0ff;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      padding: 7px 14px;
      cursor: pointer;
      letter-spacing: 1px;
      z-index: 100;
      transition: all 0.2s;
    }
    #backBtn:hover { background:#0ff1; border-color:#0ff; }
    #gameWrapper {
      position: relative;
      width: 1280px;
      height: 720px;
      transform-origin: top center;
    }
    canvas {
      display: block;
      border: 1px solid #1a1a3e;
      box-shadow: 0 0 30px #0ff3, 0 0 60px #00f2;
    }
    #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    #hud {
      position: absolute; top: 10px; left: 0; width: 100%;
      display: flex; justify-content: space-between; padding: 0 14px;
      color: #0ff; font-size: 20px; text-shadow: 0 0 8px #0ff;
    }
    #lives { color: #f55; text-shadow: 0 0 8px #f55; }
    #levelBanner {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #ff0; font-size: 40px; font-weight: bold;
      text-shadow: 0 0 16px #ff0; opacity: 0;
      transition: opacity 0.4s; pointer-events: none; white-space: nowrap;
    }
    #overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.82); pointer-events: all;
    }
    #overlay h1 { font-size: 56px; color: #f55; text-shadow: 0 0 20px #f55; margin-bottom: 10px; letter-spacing: 4px; }
    #overlay .subtitle { color: #aaa; font-size: 18px; margin-bottom: 6px; }
    #overlay .score-display { color: #0ff; font-size: 26px; text-shadow: 0 0 10px #0ff; margin-bottom: 4px; }
    #overlay .best-display { color: #ff0; font-size: 18px; text-shadow: 0 0 8px #ff0; margin-bottom: 20px; }
    #overlay button {
      background: transparent; border: 2px solid #0ff; color: #0ff;
      font-family: 'Courier New', monospace; font-size: 22px;
      padding: 12px 40px; cursor: pointer; text-shadow: 0 0 8px #0ff;
      box-shadow: 0 0 14px #0ff4; transition: all 0.2s; letter-spacing: 2px; margin: 6px;
    }
    #overlay button:hover { background: #0ff2; box-shadow: 0 0 28px #0ff8; }
    #overlay .btn-menu { border-color:#888; color:#888; text-shadow:none; box-shadow:none; font-size:13px; padding:8px 24px; }
    #overlay .btn-menu:hover { background:#8881; border-color:#aaa; color:#aaa; }
    #startScreen h1 { color: #0ff; text-shadow: 0 0 20px #0ff; }
    #powerupHint {
      position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
      font-size: 14px; color: #555; pointer-events: none; white-space: nowrap;
    }

    /* ── Responsive canvas scaling ── */
    /* (gameWrapper already defined above with transform-origin) */

    /* ── Mobile touch controls ── */
    #touchControls {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 170px;
      z-index: 50;
      pointer-events: none;
    }
    #joystickArea {
      position: absolute;
      left: 20px; bottom: 20px;
      width: 130px; height: 130px;
      pointer-events: all;
      touch-action: none;
    }
    #joystickBase {
      position: absolute; inset: 0;
      border-radius: 50%;
      background: rgba(0,255,255,0.08);
      border: 2px solid rgba(0,255,255,0.3);
    }
    #joystickKnob {
      position: absolute;
      width: 52px; height: 52px;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      border-radius: 50%;
      background: rgba(0,255,255,0.25);
      border: 2px solid #0ff;
      box-shadow: 0 0 12px #0ff6;
      pointer-events: none;
    }
    #fireBtn {
      position: absolute;
      right: 30px; bottom: 30px;
      width: 80px; height: 80px;
      border-radius: 50%;
      background: rgba(255,200,0,0.15);
      border: 3px solid #ff0;
      color: #ff0;
      font-size: 26px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 16px #ff04;
      pointer-events: all;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    #fireBtn:active { background: rgba(255,200,0,0.35); }

    @media (max-width: 540px) {
      #touchControls { display: block; }
      #powerupHint { display: none; }
      body { justify-content: flex-start; padding-top: 4px; }
    }
  </style>
</head>
<body>
<button id="backBtn" onclick="window.location.href='../index.html'">◀ MENÚ</button>
<div id="gameWrapper">
  <canvas id="canvas" width="1280" height="720"></canvas>
  <div id="ui">
    <div id="hud">
      <span id="scoreHud">SCORE: 0</span>
      <span id="levelHud">LEVEL: 1</span>
      <span id="lives">♥ ♥ ♥</span>
    </div>
    <div id="levelBanner"></div>
    <div id="powerupHint">← → mover &nbsp;|&nbsp; SPACE disparar &nbsp;|&nbsp; Z triple disparo</div>
  </div>
  <div id="overlay">
    <h1 style="color:#0ff;text-shadow:0 0 20px #0ff">SPACE<br>SHOOTER</h1>
    <div class="subtitle" style="margin-top:8px;margin-bottom:20px;">← → mover &nbsp;|&nbsp; SPACE / Z disparar</div>
    <div class="subtitle">Recoge power-ups para ventajas</div>
    <div class="subtitle" style="margin-bottom:24px;">🛡 Escudo &nbsp; 🔥 Triple disparo &nbsp; ⭐ +50pts &nbsp; ♥ Vida</div>
    <button id="startBtn">▶ INICIAR</button>
    <button class="btn-menu" onclick="window.location.href='../index.html'">◀ MENÚ PRINCIPAL</button>
  </div>
</div>

<!-- Mobile touch controls -->
<div id="touchControls">
  <div id="joystickArea">
    <div id="joystickBase"></div>
    <div id="joystickKnob"></div>
  </div>
  <div id="fireBtn">🔥</div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

let state = 'start';
let score = 0, bestScore = parseInt(localStorage.getItem('ss_best')||0), level = 1, lives = 3;
let frameCount = 0, keys = {};
let player, bullets, meteors, particles, powerups;
let boss = null, bossLasers = [], bossNum = 0, nextBossScore = 500, bossWarning = 0;

const stars = Array.from({length:120}, () => ({
  x: Math.random()*W, y: Math.random()*H,
  r: Math.random()*1.5+0.3, speed: Math.random()*0.8+0.2, alpha: Math.random()*0.7+0.3
}));

function initGame() {
  score=0; level=1; lives=3; frameCount=0;
  boss=null; bossLasers=[]; bossNum=0; nextBossScore=500; bossWarning=0;
  player = { x:W/2, y:H-80, w:117, h:43, speed:13, shootCooldown:0, shield:0, tripleShot:0, invincible:0, thrusterAnim:0 };
  bullets=[]; meteors=[]; particles=[]; powerups=[];
  spawnMeteors(5+level);
}

function spawnMeteors(n) { for(let i=0;i<n;i++) meteors.push(createMeteor()); }

function createMeteor(fromTop=true) {
  const size = Math.random()*59+48;
  return { x:Math.random()*(W-size*2)+size, y:fromTop?-size-Math.random()*200:-size,
    r:size, speed:(Math.random()*1.5+1)*(1+level*0.12), rot:0,
    rotSpeed:(Math.random()-0.5)*0.06, hp:size>85?2:1,
    color:`hsl(${20+Math.random()*30},80%,${40+Math.random()*20}%)` };
}

function createPowerup(x,y) {
  const types=['shield','triple','star','life'], weights=[3,3,3,1];
  let r=Math.random()*weights.reduce((a,b)=>a+b,0), type;
  for(let i=0;i<types.length;i++){r-=weights[i];if(r<=0){type=types[i];break;}}
  return {x,y,type,speed:4,r:32,anim:0};
}

function spawnBoss() {
  bossNum++;
  const n = bossNum;
  // HP, velocidad, cadencia de disparo y cantidad de laseres escalan con cada jefe
  const hp = 20 + n * 15;
  const speed = 1.2 + n * 0.3;
  const shootRate = Math.max(40, 110 - n * 12); // frames entre disparos
  const laserCount = Math.min(1 + Math.floor(n / 2), 5); // hasta 5 laseres
  boss = {
    x: W/2, y: -90, w: 213, h: 68,
    hp, maxHp: hp, speed, dir: 1,
    shootRate, shootTimer: 60,
    laserCount, phase: 'enter', // enter -> fight
    anim: 0, hitFlash: 0,
    color: `hsl(${280 + n*20},90%,55%)`
  };
  meteors = []; // limpia meteoros durante el jefe
  showLevelBanner(`⚠ JEFE ${n} ⚠`);
}

function createBossLaser(fromX, fromY, targetX, targetY, speed=5) {
  const dx = targetX - fromX, dy = targetY - fromY;
  const dist = Math.sqrt(dx*dx+dy*dy);
  return { x:fromX, y:fromY, vx:(dx/dist)*speed, vy:(dy/dist)*speed, r:13, life:1 };
}

function drawBoss() {
  if(!boss) return;
  const b = boss;
  b.anim += 0.04;
  const n = bossNum;
  ctx.save(); ctx.translate(b.x, b.y);

  // Flash de daño (compartido)
  if(b.hitFlash > 0) { ctx.globalAlpha = b.hitFlash/8; ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(0,0,b.w,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1; }

  // ── JEFE 1: Demonio Asylum — masivo, marrón/naranja, martillo ──
  if(n === 1) {
    ctx.globalAlpha = 0.15 + 0.07*Math.sin(b.anim*2);
    ctx.fillStyle = '#c85000'; ctx.shadowColor = '#ff6600'; ctx.shadowBlur = 40;
    ctx.beginPath(); ctx.arc(0, 0, b.w, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    ctx.fillStyle = '#5a3010'; ctx.shadowColor='#c86020'; ctx.shadowBlur=12;
    ctx.beginPath(); ctx.ellipse(0, 5, b.w*0.55, b.h*0.65, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#3d2008';
    ctx.beginPath(); ctx.ellipse(-b.w*0.5, -5, 20, 16, -0.3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse( b.w*0.5, -5, 20, 16,  0.3, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#3d2008'; ctx.lineWidth = 10;
    ctx.beginPath(); ctx.moveTo(b.w*0.5, -5); ctx.lineTo(b.w*0.75, 18+Math.sin(b.anim)*8); ctx.stroke();
    ctx.fillStyle = '#666'; ctx.shadowColor='#888'; ctx.shadowBlur=6;
    ctx.fillRect(b.w*0.65, 18+Math.sin(b.anim)*8, 22, 14);
    ctx.strokeStyle = '#3d2008'; ctx.lineWidth = 8;
    ctx.beginPath(); ctx.moveTo(-b.w*0.5, -5); ctx.lineTo(-b.w*0.7, 10+Math.cos(b.anim)*5); ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#6b3c18'; ctx.shadowColor='#c86020'; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.ellipse(0, -b.h*0.5, 22, 18, 0, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#2a1505';
    ctx.beginPath(); ctx.moveTo(-14,-b.h*0.5-12); ctx.lineTo(-20,-b.h*0.5-32); ctx.lineTo(-6,-b.h*0.5-14); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo( 14,-b.h*0.5-12); ctx.lineTo( 20,-b.h*0.5-32); ctx.lineTo(  6,-b.h*0.5-14); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#ff4400'; ctx.shadowColor='#ff4400'; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.arc(-8,-b.h*0.5,4,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc( 8,-b.h*0.5,4,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  }

  // ── JEFE 2: Queelag — araña/lava, rojo, patas ──
  if(n === 2) {
    ctx.globalAlpha = 0.15 + 0.07*Math.sin(b.anim*2);
    ctx.fillStyle = '#aa0000'; ctx.shadowColor='#ff3300'; ctx.shadowBlur=40;
    ctx.beginPath(); ctx.arc(0, 0, b.w, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    ctx.fillStyle = '#1a0000'; ctx.shadowColor='#cc2200'; ctx.shadowBlur=14;
    ctx.beginPath(); ctx.ellipse(0, 10, b.w*0.5, b.h*0.55, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#3a0000'; ctx.lineWidth = 5;
    [[-1,1],[-0.6,0.6],[-1.1,-0.2],[-0.65,-0.5]].forEach(([lx,rx], i) => {
      const yo = i * 10 - 10, wiggle = Math.sin(b.anim*3+i)*6;
      ctx.beginPath(); ctx.moveTo(-18, yo); ctx.lineTo(-b.w*0.8+lx*10, yo+16+wiggle); ctx.stroke();
      ctx.beginPath(); ctx.moveTo( 18, yo); ctx.lineTo( b.w*0.8+rx*10, yo+16+wiggle); ctx.stroke();
    });
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#4a1010'; ctx.shadowColor='#cc2200'; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.ellipse(0, -b.h*0.3, 16, 22, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#3a0808';
    ctx.beginPath(); ctx.ellipse(0, -b.h*0.6, 12, 12, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#110000'; ctx.lineWidth = 2;
    for(let i=-3;i<=3;i++) { ctx.beginPath(); ctx.moveTo(i*4,-b.h*0.6-10); ctx.lineTo(i*5+Math.sin(b.anim+i)*3,-b.h*0.6-28); ctx.stroke(); }
    ctx.shadowBlur = 0;
    ctx.fillStyle='#ff2200'; ctx.shadowColor='#ff2200'; ctx.shadowBlur=12;
    ctx.beginPath(); ctx.arc(-5,-b.h*0.62,3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc( 5,-b.h*0.62,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = `rgba(255,${80+Math.floor(Math.sin(b.anim*4)*40)},0,0.5)`;
    ctx.shadowColor='#ff5500'; ctx.shadowBlur=18;
    ctx.beginPath(); ctx.ellipse(0, 16, 20, 12, 0, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  }

  // ── JEFE 3: Cuatro Reyes — espectral, violeta ──
  if(n === 3) {
    ctx.globalAlpha = 0.12 + 0.1*Math.sin(b.anim*1.5);
    ctx.fillStyle = '#6600aa'; ctx.shadowColor='#aa00ff'; ctx.shadowBlur=50;
    ctx.beginPath(); ctx.arc(0, 0, b.w*1.1, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    [[-22,-8],[22,-8],[-12,14],[12,14]].forEach(([ox,oy], i) => {
      const drift = Math.sin(b.anim*1.2+i*1.3)*4;
      ctx.globalAlpha = 0.55 + 0.15*Math.sin(b.anim+i);
      ctx.fillStyle = i%2===0 ? '#330055' : '#220044';
      ctx.shadowColor = '#aa00ff'; ctx.shadowBlur = 16;
      ctx.beginPath(); ctx.moveTo(ox,oy-18+drift); ctx.lineTo(ox-10,oy+10+drift); ctx.lineTo(ox-6,oy+22+drift); ctx.lineTo(ox+6,oy+22+drift); ctx.lineTo(ox+10,oy+10+drift); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#7700cc'; ctx.fillRect(ox-8,oy-22+drift,16,5);
      ctx.beginPath(); ctx.arc(ox,oy-22+drift,3,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ff00ff'; ctx.shadowColor='#ff00ff'; ctx.shadowBlur=8;
      ctx.beginPath(); ctx.arc(ox,oy-10+drift,3,0,Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;
  }

  // ── JEFE 4: Gravelord Nito — calaveras, verde neón, guadaña ──
  if(n === 4) {
    ctx.globalAlpha = 0.14 + 0.08*Math.sin(b.anim*1.8);
    ctx.fillStyle = '#001a00'; ctx.shadowColor='#00ff44'; ctx.shadowBlur=44;
    ctx.beginPath(); ctx.arc(0, 0, b.w, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    ctx.fillStyle = '#050a05'; ctx.shadowColor='#00aa22'; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.moveTo(0,-b.h*0.6); ctx.bezierCurveTo(-b.w*0.7,-b.h*0.1,-b.w*0.8,b.h*0.4,-b.w*0.3,b.h*0.5); ctx.lineTo(b.w*0.3,b.h*0.5); ctx.bezierCurveTo(b.w*0.8,b.h*0.4,b.w*0.7,-b.h*0.1,0,-b.h*0.6); ctx.fill();
    ctx.shadowBlur = 0;
    [[-20,0],[20,0],[0,15],[-10,-14]].forEach(([sx,sy]) => {
      ctx.fillStyle = '#c8c8a0'; ctx.shadowColor='#00ff44'; ctx.shadowBlur=6;
      ctx.beginPath(); ctx.ellipse(sx,sy,7,6,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#050a05';
      ctx.beginPath(); ctx.ellipse(sx-2,sy+1,2,2.5,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(sx+2,sy+1,2,2.5,0,0,Math.PI*2); ctx.fill();
    });
    ctx.shadowBlur = 0;
    ctx.strokeStyle = '#334433'; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(b.w*0.35,-b.h*0.3); ctx.lineTo(b.w*0.7,b.h*0.1+Math.sin(b.anim)*6); ctx.stroke();
    ctx.strokeStyle = '#aaffaa'; ctx.lineWidth = 2; ctx.shadowColor='#00ff88'; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.arc(b.w*0.7+12,b.h*0.1+Math.sin(b.anim)*6-12,18,0.3,Math.PI*0.9); ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.fillStyle='#00ff44'; ctx.shadowColor='#00ff44'; ctx.shadowBlur=14;
    ctx.beginPath(); ctx.arc(-6,-b.h*0.5,4,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc( 6,-b.h*0.5,4,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  }

  // ── JEFE 5+: Gwyn, Señor del Sol — dorado, llamas, corona, espada ──
  if(n >= 5) {
    // Aura solar pulsante
    ctx.globalAlpha = 0.18 + 0.1*Math.sin(b.anim*2);
    ctx.fillStyle = '#aa7700'; ctx.shadowColor='#ffcc00'; ctx.shadowBlur=55;
    ctx.beginPath(); ctx.arc(0, 0, b.w*1.1, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    // Llamas laterales animadas
    for(let side of [-1,1]) {
      const fg = ctx.createRadialGradient(side*b.w*0.55, 0, 2, side*b.w*0.55, 0, 28);
      fg.addColorStop(0, `rgba(255,200,0,${0.7+0.2*Math.sin(b.anim*3)})`);
      fg.addColorStop(1, 'transparent');
      ctx.fillStyle = fg;
      ctx.beginPath(); ctx.arc(side*b.w*0.55, Math.sin(b.anim*2+side)*5, 26, 0, Math.PI*2); ctx.fill();
    }
    // Armadura dorada — cuerpo
    ctx.fillStyle = '#7a5800'; ctx.shadowColor='#ffcc00'; ctx.shadowBlur=16;
    ctx.beginPath();
    ctx.moveTo(0, -b.h*0.65);
    ctx.lineTo(-b.w*0.38, -b.h*0.1);
    ctx.lineTo(-b.w*0.3, b.h*0.45);
    ctx.lineTo( b.w*0.3, b.h*0.45);
    ctx.lineTo( b.w*0.38, -b.h*0.1);
    ctx.closePath(); ctx.fill();
    // Hombros con hombreras
    ctx.fillStyle = '#9a7200';
    ctx.beginPath(); ctx.ellipse(-b.w*0.42, -b.h*0.15, 16, 12, -0.4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse( b.w*0.42, -b.h*0.15, 16, 12,  0.4, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    // Capa trasera
    ctx.fillStyle = '#3a2000';
    ctx.beginPath();
    ctx.moveTo(-b.w*0.3, -b.h*0.1);
    ctx.lineTo(-b.w*0.6, b.h*0.5+Math.sin(b.anim)*6);
    ctx.lineTo( b.w*0.6, b.h*0.5+Math.sin(b.anim+1)*6);
    ctx.lineTo( b.w*0.3, -b.h*0.1);
    ctx.closePath(); ctx.fill();
    // Espada (brazo derecho)
    ctx.save(); ctx.translate(b.w*0.45, -b.h*0.1);
    ctx.rotate(0.4 + Math.sin(b.anim)*0.15);
    ctx.fillStyle = '#ccaa00'; ctx.shadowColor='#ffee44'; ctx.shadowBlur=12;
    ctx.fillRect(-3, -b.h*0.5, 6, b.h*0.7); // hoja
    ctx.fillStyle = '#4a3000'; ctx.fillRect(-10, -b.h*0.07, 20, 5); // guarda
    ctx.shadowBlur = 0; ctx.restore();
    // Cabeza
    ctx.fillStyle = '#8a6600'; ctx.shadowColor='#ffcc00'; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.ellipse(0, -b.h*0.72, 14, 14, 0, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    // Corona
    ctx.fillStyle = '#ffcc00'; ctx.shadowColor='#ffee00'; ctx.shadowBlur=14;
    ctx.beginPath();
    ctx.moveTo(-12, -b.h*0.82); ctx.lineTo(-12, -b.h*0.95);
    ctx.lineTo(-7,  -b.h*0.87); ctx.lineTo(0,  -b.h*1.0);
    ctx.lineTo( 7,  -b.h*0.87); ctx.lineTo(12, -b.h*0.95);
    ctx.lineTo(12, -b.h*0.82); ctx.closePath(); ctx.fill();
    ctx.shadowBlur = 0;
    // Ojos dorados
    ctx.fillStyle='#fff7aa'; ctx.shadowColor='#ffee00'; ctx.shadowBlur=12;
    ctx.beginPath(); ctx.arc(-5,-b.h*0.73,3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc( 5,-b.h*0.73,3,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  }

  ctx.restore();
  if(n === 4) {
    ctx.globalAlpha = 0.14 + 0.08*Math.sin(b.anim*1.8);
    ctx.fillStyle = '#001a00'; ctx.shadowColor='#00ff44'; ctx.shadowBlur=44;
    ctx.beginPath(); ctx.arc(0, 0, b.w, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    // Manto oscuro
    ctx.fillStyle = '#050a05'; ctx.shadowColor='#00aa22'; ctx.shadowBlur=10;
    ctx.beginPath();
    ctx.moveTo(0, -b.h*0.6);
    ctx.bezierCurveTo(-b.w*0.7, -b.h*0.1, -b.w*0.8, b.h*0.4, -b.w*0.3, b.h*0.5);
    ctx.lineTo( b.w*0.3, b.h*0.5);
    ctx.bezierCurveTo( b.w*0.8, b.h*0.4,  b.w*0.7, -b.h*0.1, 0, -b.h*0.6);
    ctx.fill();
    ctx.shadowBlur = 0;
    // Calaveras incrustadas (4 pequeñas)
    const skullPos = [[-20,0],[20,0],[0,15],[-10,-14]];
    skullPos.forEach(([sx,sy]) => {
      ctx.fillStyle = '#c8c8a0'; ctx.shadowColor='#00ff44'; ctx.shadowBlur=6;
      ctx.beginPath(); ctx.ellipse(sx, sy, 7, 6, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#050a05';
      ctx.beginPath(); ctx.ellipse(sx-2, sy+1, 2, 2.5, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(sx+2, sy+1, 2, 2.5, 0, 0, Math.PI*2); ctx.fill();
    });
    ctx.shadowBlur = 0;
    // Guadaña (brazo derecho)
    ctx.strokeStyle = '#334433'; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(b.w*0.35, -b.h*0.3); ctx.lineTo(b.w*0.7, b.h*0.1+Math.sin(b.anim)*6); ctx.stroke();
    ctx.strokeStyle = '#aaffaa'; ctx.lineWidth = 2; ctx.shadowColor='#00ff88'; ctx.shadowBlur=10;
    ctx.beginPath();
    ctx.arc(b.w*0.7+12, b.h*0.1+Math.sin(b.anim)*6-12, 18, 0.3, Math.PI*0.9);
    ctx.stroke();
    ctx.shadowBlur = 0;
    // Ojos verde neón
    ctx.fillStyle='#00ff44'; ctx.shadowColor='#00ff44'; ctx.shadowBlur=14;
    ctx.beginPath(); ctx.arc(-6,-b.h*0.5,4,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc( 6,-b.h*0.5,4,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  }
  if(n === 3) {
    // Aura espectral
    ctx.globalAlpha = 0.12 + 0.1*Math.sin(b.anim*1.5);
    ctx.fillStyle = '#6600aa'; ctx.shadowColor='#aa00ff'; ctx.shadowBlur=50;
    ctx.beginPath(); ctx.arc(0, 0, b.w*1.1, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    // Cuatro siluetas fantasmales desplazadas
    const offsets = [[-22,-8],[22,-8],[-12,14],[12,14]];
    offsets.forEach(([ox,oy], i) => {
      const drift = Math.sin(b.anim*1.2 + i*1.3)*4;
      ctx.globalAlpha = 0.55 + 0.15*Math.sin(b.anim+i);
      ctx.fillStyle = i%2===0 ? '#330055' : '#220044';
      ctx.shadowColor = '#aa00ff'; ctx.shadowBlur = 16;
      // Cuerpo fantasmal
      ctx.beginPath();
      ctx.moveTo(ox, oy-18+drift);
      ctx.lineTo(ox-10, oy+10+drift);
      ctx.lineTo(ox-6, oy+22+drift);
      ctx.lineTo(ox+6, oy+22+drift);
      ctx.lineTo(ox+10, oy+10+drift);
      ctx.closePath(); ctx.fill();
      // Corona simple
      ctx.fillStyle = '#7700cc';
      ctx.fillRect(ox-8, oy-22+drift, 16, 5);
      ctx.beginPath(); ctx.arc(ox, oy-22+drift, 3, 0, Math.PI*2); ctx.fill();
      // Ojo
      ctx.fillStyle = '#ff00ff'; ctx.shadowColor='#ff00ff'; ctx.shadowBlur=8;
      ctx.beginPath(); ctx.arc(ox, oy-10+drift, 3, 0, Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;
  }
  if(n === 2) {
    ctx.globalAlpha = 0.15 + 0.07*Math.sin(b.anim*2);
    ctx.fillStyle = '#aa0000'; ctx.shadowColor='#ff3300'; ctx.shadowBlur=40;
    ctx.beginPath(); ctx.arc(0, 0, b.w, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    // Cuerpo araña (abdomen)
    ctx.fillStyle = '#1a0000'; ctx.shadowColor='#cc2200'; ctx.shadowBlur=14;
    ctx.beginPath(); ctx.ellipse(0, 10, b.w*0.5, b.h*0.55, 0, 0, Math.PI*2); ctx.fill();
    // Patas (4 pares)
    ctx.strokeStyle = '#3a0000'; ctx.lineWidth = 5;
    [[-1,1],[-0.6,0.6],[-1.1,-0.2],[-0.65,-0.5]].forEach(([lx,rx], i) => {
      const yo = i * 10 - 10;
      const wiggle = Math.sin(b.anim * 3 + i) * 6;
      ctx.beginPath(); ctx.moveTo(-18, yo); ctx.lineTo(-b.w*0.8+lx*10, yo+16+wiggle); ctx.stroke();
      ctx.beginPath(); ctx.moveTo( 18, yo); ctx.lineTo( b.w*0.8+rx*10, yo+16+wiggle); ctx.stroke();
    });
    ctx.shadowBlur = 0;
    // Torso humanoide (parte superior)
    ctx.fillStyle = '#4a1010'; ctx.shadowColor='#cc2200'; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.ellipse(0, -b.h*0.3, 16, 22, 0, 0, Math.PI*2); ctx.fill();
    // Cabeza
    ctx.fillStyle = '#3a0808';
    ctx.beginPath(); ctx.ellipse(0, -b.h*0.6, 12, 12, 0, 0, Math.PI*2); ctx.fill();
    // Pelo largo (líneas)
    ctx.strokeStyle = '#110000'; ctx.lineWidth = 2;
    for(let i=-3;i<=3;i++) { ctx.beginPath(); ctx.moveTo(i*4,-b.h*0.6-10); ctx.lineTo(i*5+Math.sin(b.anim+i)*3,-b.h*0.6-28); ctx.stroke(); }
    ctx.shadowBlur = 0;
    // Ojos brillantes
    ctx.fillStyle='#ff2200'; ctx.shadowColor='#ff2200'; ctx.shadowBlur=12;
    ctx.beginPath(); ctx.arc(-5,-b.h*0.62,3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc( 5,-b.h*0.62,3,0,Math.PI*2); ctx.fill();
    // Lava en el vientre
    ctx.fillStyle = `rgba(255,${80+Math.floor(Math.sin(b.anim*4)*40)},0,0.5)`;
    ctx.shadowColor='#ff5500'; ctx.shadowBlur=18;
    ctx.beginPath(); ctx.ellipse(0, 16, 20, 12, 0, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  }
  if(n === 1) {
    // Aura naranja
    ctx.globalAlpha = 0.15 + 0.07*Math.sin(b.anim*2);
    ctx.fillStyle = '#c85000'; ctx.shadowColor = '#ff6600'; ctx.shadowBlur = 40;
    ctx.beginPath(); ctx.arc(0, 0, b.w, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    // Cuerpo gordo
    ctx.fillStyle = '#5a3010'; ctx.shadowColor='#c86020'; ctx.shadowBlur=12;
    ctx.beginPath();
    ctx.ellipse(0, 5, b.w*0.55, b.h*0.65, 0, 0, Math.PI*2);
    ctx.fill();
    // Hombros
    ctx.fillStyle = '#3d2008';
    ctx.beginPath(); ctx.ellipse(-b.w*0.5, -5, 20, 16, -0.3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse( b.w*0.5, -5, 20, 16,  0.3, 0, Math.PI*2); ctx.fill();
    // Brazo con martillo (derecho)
    ctx.strokeStyle = '#3d2008'; ctx.lineWidth = 10;
    ctx.beginPath(); ctx.moveTo(b.w*0.5, -5); ctx.lineTo(b.w*0.75, 18+Math.sin(b.anim)*8); ctx.stroke();
    ctx.fillStyle = '#666'; ctx.shadowColor='#888'; ctx.shadowBlur=6;
    ctx.fillRect(b.w*0.65, 18+Math.sin(b.anim)*8, 22, 14);
    // Brazo izquierdo
    ctx.strokeStyle = '#3d2008'; ctx.lineWidth = 8;
    ctx.beginPath(); ctx.moveTo(-b.w*0.5, -5); ctx.lineTo(-b.w*0.7, 10+Math.cos(b.anim)*5); ctx.stroke();
    ctx.shadowBlur = 0;
    // Cabeza
    ctx.fillStyle = '#6b3c18'; ctx.shadowColor='#c86020'; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.ellipse(0, -b.h*0.5, 22, 18, 0, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    // Cuernos
    ctx.fillStyle = '#2a1505';
    ctx.beginPath(); ctx.moveTo(-14,-b.h*0.5-12); ctx.lineTo(-20,-b.h*0.5-32); ctx.lineTo(-6,-b.h*0.5-14); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo( 14,-b.h*0.5-12); ctx.lineTo( 20,-b.h*0.5-32); ctx.lineTo(  6,-b.h*0.5-14); ctx.closePath(); ctx.fill();
    // Ojos
    ctx.fillStyle='#ff4400'; ctx.shadowColor='#ff4400'; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.arc(-8,-b.h*0.5,4,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc( 8,-b.h*0.5,4,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  }

  ctx.restore();

  // Barra de vida del jefe (arriba del canvas)
  const bw = W - 40, bh = 14, bx = 53, by = 34;
  ctx.fillStyle = '#111'; ctx.fillRect(bx, by, bw, bh);
  const pct = b.hp / b.maxHp;
  const barColor = pct > 0.5 ? '#0f0' : pct > 0.25 ? '#ff0' : '#f00';
  ctx.fillStyle = barColor; ctx.shadowColor = barColor; ctx.shadowBlur = 6;
  ctx.fillRect(bx, by, bw * pct, bh);
  ctx.shadowBlur = 0;
  ctx.strokeStyle = '#555'; ctx.lineWidth = 1; ctx.strokeRect(bx, by, bw, bh);
  ctx.fillStyle = '#fff'; ctx.font = '10px Courier New'; ctx.textAlign = 'center';
  ctx.fillText(`JEFE ${bossNum}  HP: ${b.hp}/${b.maxHp}`, W/2, by + bh/2 + 1);
}

function drawBossLasers() {
  bossLasers.forEach(l => {
    ctx.save();
    ctx.globalAlpha = l.life;
    ctx.shadowColor = '#f0f'; ctx.shadowBlur = 14;
    ctx.fillStyle = '#f0f';
    ctx.beginPath(); ctx.arc(l.x, l.y, l.r, 0, Math.PI*2); ctx.fill();
    // Estela
    ctx.fillStyle = 'rgba(255,0,255,0.3)';
    ctx.beginPath(); ctx.arc(l.x - l.vx*3, l.y - l.vy*3, l.r*0.6, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

function updateBoss() {
  if(!boss) return;
  const b = boss;
  if(b.hitFlash > 0) b.hitFlash--;

  // Fase de entrada
  if(b.phase === 'enter') {
    b.y += 2.5;
    if(b.y >= 113) { b.y = 113; b.phase = 'fight'; }
    return;
  }

  // Movimiento lateral oscilante
  b.x += b.speed * b.dir;
  if(b.x > W - b.w*0.6) { b.x = W - b.w*0.6; b.dir = -1; }
  if(b.x < b.w*0.6)     { b.x = b.w*0.6;     b.dir =  1; }

  // Disparo de laseres
  b.shootTimer--;
  if(b.shootTimer <= 0) {
    b.shootTimer = b.shootRate;
    const spread = b.laserCount;
    for(let i = 0; i < spread; i++) {
      const offsetX = (i - (spread-1)/2) * 28;
      // Apunta al jugador con ligera variación
      const tx = player.x + (Math.random()-0.5)*40;
      const ty = player.y;
      bossLasers.push(createBossLaser(b.x + offsetX, b.y + 30, tx, ty, 13 + bossNum*1));
    }
  }

  // Actualizar laseres
  bossLasers = bossLasers.filter(l => {
    l.x += l.vx; l.y += l.vy;
    l.life -= 0.008;
    return l.y < H + 20 && l.x > -20 && l.x < W+20 && l.life > 0;
  });

  // Colisión laseres con jugador
  if(player.invincible === 0) {
    bossLasers = bossLasers.filter(l => {
      const dx = player.x - l.x, dy = player.y - l.y;
      if(Math.sqrt(dx*dx+dy*dy) < l.r + 43) {
        if(player.shield > 0) { player.shield=0; explode(player.x,player.y,'#0ff',20); player.invincible=60; }
        else { lives--; explode(player.x,player.y,'#f55',30); player.invincible=90; if(lives<=0){state='gameover';showGameOver();} }
        return false;
      }
      return true;
    });
  }

  // Colisión balas del jugador con el jefe
  bullets = bullets.filter(bul => {
    const dx = bul.x - b.x, dy = bul.y - b.y;
    if(Math.abs(dx) < b.w*0.7 && Math.abs(dy) < b.h*0.8) {
      b.hp--; b.hitFlash = 8;
      explode(bul.x, bul.y, b.color, 6);
      if(b.hp <= 0) {
        // Jefe muerto
        score += 100 + bossNum * 50;
        for(let i=0;i<5;i++) powerups.push(createPowerup(b.x + (Math.random()-0.5)*80, b.y + (Math.random()-0.5)*40));
        explode(b.x, b.y, b.color, 60);
        explode(b.x-30, b.y+10, '#ff0', 30);
        explode(b.x+30, b.y+10, '#f80', 30);
        showLevelBanner(`💥 JEFE ${bossNum} DERROTADO! +${100+bossNum*50}pts`);
        boss = null; bossLasers = [];
        nextBossScore = score + 500;
        spawnMeteors(5 + level); // vuelven los meteoros
      }
      return false;
    }
    return true;
  });
}

document.addEventListener('keydown', e => { keys[e.code]=true; if(e.code==='Space'||e.code==='KeyZ') e.preventDefault(); });
document.addEventListener('keyup', e => { keys[e.code]=false; });

document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('overlay').style.display='none';
  initGame(); state='playing';
});

function shoot() {
  if(player.shootCooldown>0) return;
  player.shootCooldown = player.tripleShot>0?10:14;
  if(player.tripleShot>0) {
    bullets.push({x:player.x,y:player.y-10,speed:29,angle:-Math.PI/2});
    bullets.push({x:player.x-14,y:player.y,speed:29,angle:-Math.PI/2-0.18});
    bullets.push({x:player.x+14,y:player.y,speed:29,angle:-Math.PI/2+0.18});
  } else {
    bullets.push({x:player.x,y:player.y-10,speed:29,angle:-Math.PI/2});
  }
}

function explode(x,y,color,n=18) {
  for(let i=0;i<n;i++){
    const angle=Math.random()*Math.PI*2, speed=Math.random()*3+1;
    particles.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,
      life:1,decay:Math.random()*0.03+0.02,r:Math.random()*3+1,color});
  }
}

function showLevelBanner(txt) {
  const el=document.getElementById('levelBanner');
  el.textContent=txt; el.style.opacity='1';
  setTimeout(()=>{el.style.opacity='0';},1800);
}

function updateHUD() {
  document.getElementById('scoreHud').textContent=`SCORE: ${score}`;
  document.getElementById('levelHud').textContent=`LEVEL: ${level}`;
  const h=document.getElementById('lives');
  h.textContent='♥ '.repeat(lives).trim()||'☠';
  h.style.color=lives<=1?'#f00':'#f55';
}

function showGameOver() {
  if(score>bestScore){ bestScore=score; localStorage.setItem('ss_best',bestScore); }
  const ov=document.getElementById('overlay');
  ov.innerHTML=`
    <h1>GAME<br>OVER</h1>
    <div class="score-display">SCORE: ${score}</div>
    <div class="best-display">MEJOR: ${bestScore}</div>
    <button id="retryBtn">↺ REINTENTAR</button>
    <button class="btn-menu" onclick="window.location.href='../index.html'">◀ MENÚ PRINCIPAL</button>`;
  ov.style.display='flex';
  document.getElementById('retryBtn').addEventListener('click',()=>{
    ov.style.display='none'; initGame(); state='playing';
  });
}

function drawStars() {
  stars.forEach(s=>{
    s.y+=s.speed*(state==='playing'?1:0.3);
    if(s.y>H){s.y=0;s.x=Math.random()*W;}
    ctx.globalAlpha=s.alpha; ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
}

function drawPlayer() {
  const p = player;
  ctx.save();
  ctx.translate(p.x, p.y);

  // Escudo
  if (p.shield > 0) {
    ctx.globalAlpha = Math.min(1, p.shield / 60) * 0.5;
    ctx.strokeStyle = '#0ff'; ctx.lineWidth = 3;
    ctx.shadowColor = '#0ff'; ctx.shadowBlur = 14;
    ctx.beginPath(); ctx.arc(0, 0, 36, 0, Math.PI * 2); ctx.stroke();
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;
  }

  // Parpadeo de invencibilidad
  if (p.invincible > 0 && Math.floor(p.invincible / 4) % 2 === 0) {
    ctx.restore(); return;
  }

  p.thrusterAnim = (p.thrusterAnim + 0.25) % (Math.PI * 2);

  // ── Llamas de los motores laterales ──
  const flameL = 37 + Math.sin(p.thrusterAnim) * 14;
  const flameR = 37 + Math.sin(p.thrusterAnim + 1) * 14;
  [-18, 18].forEach((ox, i) => {
    const fh = i === 0 ? flameL : flameR;
    const fg = ctx.createLinearGradient(ox, 10, ox, 10 + fh);
    fg.addColorStop(0, '#00aaff');
    fg.addColorStop(0.5, '#ff6600');
    fg.addColorStop(1, 'transparent');
    ctx.fillStyle = fg;
    ctx.beginPath();
    ctx.moveTo(ox - 5, 10);
    ctx.lineTo(ox + 5, 10);
    ctx.lineTo(ox, 10 + fh);
    ctx.closePath();
    ctx.fill();
  });

  // ── Llama central pequeña (motor trasero) ──
  const fc = ctx.createLinearGradient(0, 8, 0, 8 + 10 + Math.sin(p.thrusterAnim * 1.3) * 4);
  fc.addColorStop(0, '#00ccff');
  fc.addColorStop(1, 'transparent');
  ctx.fillStyle = fc;
  ctx.beginPath();
  ctx.moveTo(-4, 8); ctx.lineTo(4, 8);
  ctx.lineTo(0, 8 + 10 + Math.sin(p.thrusterAnim * 1.3) * 4);
  ctx.closePath();
  ctx.fill();

  // ── Alas traseras grandes ──
  ctx.fillStyle = '#1e2a3a';
  ctx.shadowColor = '#1155aa'; ctx.shadowBlur = 8;
  // ala izquierda
  ctx.beginPath();
  ctx.moveTo(-10, 6);
  ctx.lineTo(-30, 14);
  ctx.lineTo(-26, 2);
  ctx.lineTo(-14, -2);
  ctx.closePath();
  ctx.fill();
  // ala derecha
  ctx.beginPath();
  ctx.moveTo(10, 6);
  ctx.lineTo(30, 14);
  ctx.lineTo(26, 2);
  ctx.lineTo(14, -2);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;

  // ── Cañones laterales (tubos) ──
  ctx.fillStyle = '#111820';
  ctx.shadowColor = '#0099ff'; ctx.shadowBlur = 6;
  // cañón izquierdo
  ctx.fillRect(-26, -18, 7, 26);
  ctx.fillRect(-23, -22, 4, 6);
  // cañón derecho
  ctx.fillRect(19, -18, 7, 26);
  ctx.fillRect(19, -22, 4, 6);

  // Detalles azules en los cañones
  ctx.fillStyle = '#00aaff'; ctx.shadowColor = '#00aaff'; ctx.shadowBlur = 8;
  ctx.fillRect(-25, -10, 5, 3);
  ctx.fillRect(20, -10, 5, 3);
  ctx.fillRect(-25, -2, 5, 3);
  ctx.fillRect(20, -2, 5, 3);
  ctx.shadowBlur = 0;

  // ── Cuerpo principal ──
  // Fuselaje oscuro
  ctx.fillStyle = '#1a2535';
  ctx.shadowColor = '#0066cc'; ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.moveTo(0, -22);      // punta de la nave
  ctx.lineTo(14, 0);
  ctx.lineTo(12, 10);
  ctx.lineTo(-12, 10);
  ctx.lineTo(-14, 0);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;

  // Detalles laterales azules del fuselaje
  ctx.fillStyle = '#0088ff'; ctx.shadowColor = '#0088ff'; ctx.shadowBlur = 10;
  // izquierda
  ctx.beginPath();
  ctx.moveTo(-14, 0); ctx.lineTo(-10, -8); ctx.lineTo(-7, 2); ctx.lineTo(-12, 6); ctx.closePath();
  ctx.fill();
  // derecha
  ctx.beginPath();
  ctx.moveTo(14, 0); ctx.lineTo(10, -8); ctx.lineTo(7, 2); ctx.lineTo(12, 6); ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;

  // ── Cápsula/cabina (cockpit) ──
  ctx.fillStyle = '#263040';
  ctx.beginPath();
  ctx.ellipse(0, -8, 5, 9, 0, 0, Math.PI * 2);
  ctx.fill();
  // cristal azul
  ctx.fillStyle = 'rgba(0, 180, 255, 0.55)';
  ctx.shadowColor = '#00ccff'; ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.ellipse(0, -10, 3, 6, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // ── Líneas de detalle en el cuerpo ──
  ctx.strokeStyle = '#0055aa'; ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.moveTo(-6, -2); ctx.lineTo(6, -2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-7, 4); ctx.lineTo(7, 4); ctx.stroke();

  // ── Aura de triple disparo ──
  if (p.tripleShot > 0) {
    ctx.fillStyle = `rgba(0, 170, 255, ${0.25 + 0.2 * Math.sin(frameCount * 0.2)})`;
    ctx.beginPath(); ctx.arc(0, 0, 28, 0, Math.PI * 2); ctx.fill();
  }

  ctx.restore();
}

function drawMeteor(m) {
  ctx.save(); ctx.translate(m.x,m.y); ctx.rotate(m.rot);
  ctx.fillStyle=m.color; ctx.shadowColor=m.color; ctx.shadowBlur=6;
  ctx.beginPath();
  for(let i=0;i<7;i++){
    const angle=(i/7)*Math.PI*2, jitter=m.r*(0.75+0.25*Math.sin(i*3.7));
    i===0?ctx.moveTo(Math.cos(angle)*jitter,Math.sin(angle)*jitter):ctx.lineTo(Math.cos(angle)*jitter,Math.sin(angle)*jitter);
  }
  ctx.closePath(); ctx.fill();
  if(m.r>30){ctx.strokeStyle='rgba(0,0,0,0.4)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(-m.r*0.3,-m.r*0.2);ctx.lineTo(m.r*0.2,m.r*0.3);ctx.stroke();}
  ctx.restore();
}

function drawBullet(b) {
  ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(b.angle+Math.PI/2);
  const g=ctx.createLinearGradient(0,-10,0,4);
  g.addColorStop(0,'#ff0'); g.addColorStop(1,'transparent');
  ctx.fillStyle=g; ctx.shadowColor='#ff0'; ctx.shadowBlur=8;
  ctx.fillRect(-2,-10,4,14); ctx.restore();
}

const PUC={shield:'#0ff',triple:'#f80',star:'#ff0',life:'#f55'};
const PUI={shield:'🛡',triple:'🔥',star:'⭐',life:'♥'};

function drawPowerup(pw) {
  pw.anim+=0.05; ctx.save(); ctx.translate(pw.x,pw.y+Math.sin(pw.anim)*4);
  const c=PUC[pw.type]; ctx.shadowColor=c; ctx.shadowBlur=14;
  ctx.strokeStyle=c; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(0,0,pw.r,0,Math.PI*2); ctx.stroke();
  ctx.font='14px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(PUI[pw.type],0,1); ctx.restore();
}

function applyPowerup(type) {
  if(type==='shield'){player.shield=300;explode(player.x,player.y,'#0ff',15);}
  if(type==='triple'){player.tripleShot=300;explode(player.x,player.y,'#f80',15);}
  if(type==='star'){score+=50;explode(player.x,player.y,'#ff0',20);}
  if(type==='life'){lives=Math.min(5,lives+1);explode(player.x,player.y,'#f55',15);}
}

function update() {
  frameCount++;
  const p=player;
  if(keys['ArrowLeft']||keys['KeyA']||keys['TouchLeft']) p.x=Math.max(p.w/2,p.x-p.speed);
  if(keys['ArrowRight']||keys['KeyD']||keys['TouchRight']) p.x=Math.min(W-p.w/2,p.x+p.speed);
  if(keys['Space']||keys['KeyZ']||keys['TouchFire']) shoot();
  if(p.shootCooldown>0) p.shootCooldown--;
  if(p.shield>0) p.shield--;
  if(p.tripleShot>0) p.tripleShot--;
  if(p.invincible>0) p.invincible--;

  bullets=bullets.filter(b=>{
    b.x+=Math.cos(b.angle)*b.speed; b.y+=Math.sin(b.angle)*b.speed;
    return b.y>-20&&b.y<H+20&&b.x>-20&&b.x<W+20;
  });
  meteors.forEach(m=>{
    m.y+=m.speed; m.rot+=m.rotSpeed;
    if(m.y>H+m.r) Object.assign(m,createMeteor(false));
  });
  const meteorsToAdd = [];
  bullets=bullets.filter(b=>{
    let hit=false;
    meteors=meteors.filter(m=>{
      if(hit) return true;
      const dx=b.x-m.x,dy=b.y-m.y;
      if(Math.sqrt(dx*dx+dy*dy)<m.r+11){
        m.hp--; hit=true; explode(m.x,m.y,m.color,10);
        if(m.hp<=0){
          score+=m.r>85?20:10; explode(m.x,m.y,m.color,22);
          if(Math.random()<0.18) powerups.push(createPowerup(m.x,m.y));
          meteorsToAdd.push(createMeteor()); return false;
        }
        return true;
      }
      return true;
    });
    return !hit;
  });
  meteors.push(...meteorsToAdd);
  if(p.invincible===0){
    meteors.forEach(m=>{
      const dx=p.x-m.x,dy=p.y-m.y;
      if(Math.sqrt(dx*dx+dy*dy)<m.r+43){
        if(p.shield>0){p.shield=0;explode(p.x,p.y,'#0ff',20);p.invincible=60;}
        else{lives--;explode(p.x,p.y,'#f55',30);p.invincible=90;if(lives<=0){state='gameover';showGameOver();}}
      }
    });
  }
  powerups=powerups.filter(pw=>{
    pw.y+=pw.speed; if(pw.y>H+pw.r) return false;
    const dx=p.x-pw.x,dy=p.y-pw.y;
    if(Math.sqrt(dx*dx+dy*dy)<pw.r+48){applyPowerup(pw.type);return false;}
    return true;
  });
  particles=particles.filter(pt=>{pt.x+=pt.vx;pt.y+=pt.vy;pt.life-=pt.decay;return pt.life>0;});
  const nextLevel=Math.floor(score/150)+1;
  if(nextLevel>level){level=nextLevel;showLevelBanner(`⬆ NIVEL ${level}`);spawnMeteors(2);}
  // Spawn de jefe cada 500 puntos
  if(!boss && score >= nextBossScore) spawnBoss();
  if(boss) updateBoss();
  updateHUD();
}

function draw() {
  ctx.fillStyle='#05050f'; ctx.fillRect(0,0,W,H);
  drawStars();
  if(state!=='playing') return;
  powerups.forEach(drawPowerup);
  meteors.forEach(drawMeteor);
  bullets.forEach(drawBullet);
  drawBossLasers();
  drawBoss();
  particles.forEach(pt=>{ctx.globalAlpha=pt.life;ctx.fillStyle=pt.color;ctx.beginPath();ctx.arc(pt.x,pt.y,pt.r,0,Math.PI*2);ctx.fill();});
  ctx.globalAlpha=1;
  drawPlayer();
  if(player.shield>0){
    const bx=player.x-106,by=player.y+70;
    ctx.fillStyle='#111';ctx.fillRect(bx,by,213,13);
    ctx.fillStyle='#0ff';ctx.fillRect(bx,by,213*(player.shield/300),13);
  }
  if(player.tripleShot>0){
    const bx=player.x-106,by=player.y+88;
    ctx.fillStyle='#111';ctx.fillRect(bx,by,213,11);
    ctx.fillStyle='#f80';ctx.fillRect(bx,by,213*(player.tripleShot/300),11);
  }
}

function loop(){ if(state==='playing') update(); draw(); requestAnimationFrame(loop); }
loop();

// ── Responsive canvas scaling ──────────────────────────────
function scaleGame() {
  const wrapper = document.getElementById('gameWrapper');
  const availW = window.innerWidth;
  const availH = window.innerHeight;
  const scaleX = availW / 1280;
  const scaleY = availH / 720;
  const scale = Math.min(scaleX, scaleY, 1); // never upscale on desktop
  wrapper.style.transform = `scale(${scale})`;
  // Center horizontally
  wrapper.style.marginLeft = `${(availW - 1280 * scale) / 2}px`;
}
window.addEventListener('resize', scaleGame);
scaleGame();

// ── Touch / joystick controls ───────────────────────────────
(function() {
  const joystickArea = document.getElementById('joystickArea');
  const knob = document.getElementById('joystickKnob');
  const fireBtnEl = document.getElementById('fireBtn');
  const BASE_R = 65; // radius of joystick base
  let joystickActive = false;
  let joystickId = null;
  let joyX = 0; // -1 to 1

  function getJoyOrigin() {
    const r = joystickArea.getBoundingClientRect();
    return { cx: r.left + r.width / 2, cy: r.top + r.height / 2 };
  }

  joystickArea.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.changedTouches[0];
    joystickId = t.identifier;
    joystickActive = true;
    updateJoy(t);
  }, { passive: false });

  joystickArea.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (t.identifier === joystickId) updateJoy(t);
    }
  }, { passive: false });

  joystickArea.addEventListener('touchend', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (t.identifier === joystickId) {
        joystickActive = false;
        joystickId = null;
        joyX = 0;
        keys['TouchLeft'] = false;
        keys['TouchRight'] = false;
        knob.style.transform = 'translate(-50%, -50%)';
      }
    }
  }, { passive: false });

  function updateJoy(touch) {
    const { cx, cy } = getJoyOrigin();
    let dx = touch.clientX - cx;
    const dy = touch.clientY - cy;
    const dist = Math.min(Math.sqrt(dx*dx + dy*dy), BASE_R);
    const angle = Math.atan2(dy, dx);
    const kx = Math.cos(angle) * dist;
    joyX = kx / BASE_R;
    knob.style.transform = `translate(calc(-50% + ${kx}px), -50%)`;
    keys['TouchLeft']  = joyX < -0.2;
    keys['TouchRight'] = joyX >  0.2;
  }

  // Fire button
  fireBtnEl.addEventListener('touchstart', e => { e.preventDefault(); keys['TouchFire'] = true; }, { passive: false });
  fireBtnEl.addEventListener('touchend',   e => { e.preventDefault(); keys['TouchFire'] = false; }, { passive: false });
})();

</script>
