<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Space Shooter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }
    #gameWrapper {
      position: relative;
      width: 480px;
      height: 640px;
    }
    canvas {
      display: block;
      border: 1px solid #1a1a3e;
      box-shadow: 0 0 30px #0ff3, 0 0 60px #00f2;
    }
    #ui {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }
    #hud {
      position: absolute;
      top: 10px; left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 14px;
      color: #0ff;
      font-size: 14px;
      text-shadow: 0 0 8px #0ff;
    }
    #lives { color: #f55; text-shadow: 0 0 8px #f55; }
    #levelBanner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ff0;
      font-size: 28px;
      font-weight: bold;
      text-shadow: 0 0 16px #ff0;
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
      white-space: nowrap;
    }
    #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.82);
      pointer-events: all;
    }
    #overlay h1 {
      font-size: 42px;
      color: #f55;
      text-shadow: 0 0 20px #f55;
      margin-bottom: 10px;
      letter-spacing: 4px;
    }
    #overlay .subtitle {
      color: #aaa;
      font-size: 14px;
      margin-bottom: 6px;
    }
    #overlay .score-display {
      color: #0ff;
      font-size: 20px;
      text-shadow: 0 0 10px #0ff;
      margin-bottom: 4px;
    }
    #overlay .best-display {
      color: #ff0;
      font-size: 14px;
      text-shadow: 0 0 8px #ff0;
      margin-bottom: 28px;
    }
    #overlay button {
      background: transparent;
      border: 2px solid #0ff;
      color: #0ff;
      font-family: 'Courier New', monospace;
      font-size: 18px;
      padding: 12px 40px;
      cursor: pointer;
      text-shadow: 0 0 8px #0ff;
      box-shadow: 0 0 14px #0ff4;
      transition: all 0.2s;
      letter-spacing: 2px;
    }
    #overlay button:hover {
      background: #0ff2;
      box-shadow: 0 0 28px #0ff8;
    }
    #startScreen h1 { color: #0ff; text-shadow: 0 0 20px #0ff; }
    #startScreen .instructions {
      color: #888;
      font-size: 12px;
      text-align: center;
      line-height: 1.8;
      margin-bottom: 24px;
    }
    #startScreen .instructions span { color: #0ff; }
    #powerupHint {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: #555;
      pointer-events: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>
<div id="gameWrapper">
  <canvas id="canvas" width="480" height="640"></canvas>
  <div id="ui">
    <div id="hud">
      <span id="scoreHud">SCORE: 0</span>
      <span id="levelHud">LEVEL: 1</span>
      <span id="lives">♥ ♥ ♥</span>
    </div>
    <div id="levelBanner"></div>
    <div id="powerupHint">← → mover &nbsp;|&nbsp; SPACE disparar &nbsp;|&nbsp; Z doble disparo</div>
  </div>

  <!-- Start Screen -->
  <div id="overlay" id="startScreen">
    <h1>SPACE<br>SHOOTER</h1>
    <div class="subtitle" style="margin-top:8px;margin-bottom:20px;">← → mover &nbsp;|&nbsp; SPACE disparar &nbsp;|&nbsp; Z doble disparo</div>
    <div class="subtitle">Recoge power-ups para ventajas</div>
    <div class="subtitle" style="margin-bottom:24px;">⚡ Escudo &nbsp; 🔥 Triple disparo &nbsp; ⭐ Puntos extra</div>
    <button id="startBtn">INICIAR</button>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// --- State ---
let state = 'start'; // start | playing | gameover
let score = 0, bestScore = 0, level = 1, lives = 3;
let frameCount = 0;
let keys = {};

// --- Stars background ---
const stars = Array.from({length: 120}, () => ({
  x: Math.random() * W,
  y: Math.random() * H,
  r: Math.random() * 1.5 + 0.3,
  speed: Math.random() * 0.8 + 0.2,
  alpha: Math.random() * 0.7 + 0.3
}));

// --- Entities ---
let player, bullets, meteors, particles, powerups;

function initGame() {
  score = 0; level = 1; lives = 3; frameCount = 0;
  player = {
    x: W / 2, y: H - 70,
    w: 44, h: 38,
    speed: 5,
    shootCooldown: 0,
    shield: 0,       // frames of shield remaining
    tripleShot: 0,   // frames of triple shot remaining
    invincible: 0,   // frames after hit
    thrusterAnim: 0
  };
  bullets = [];
  meteors = [];
  particles = [];
  powerups = [];
  spawnMeteors(5 + level);
}

function spawnMeteors(n) {
  for (let i = 0; i < n; i++) {
    meteors.push(createMeteor());
  }
}

function createMeteor(fromTop = true) {
  const size = Math.random() * 22 + 18;
  return {
    x: Math.random() * (W - size * 2) + size,
    y: fromTop ? -size - Math.random() * 200 : -size,
    r: size,
    speed: (Math.random() * 1.5 + 1) * (1 + level * 0.12),
    rot: 0,
    rotSpeed: (Math.random() - 0.5) * 0.06,
    hp: size > 32 ? 2 : 1,
    color: `hsl(${20 + Math.random()*30},80%,${40 + Math.random()*20}%)`
  };
}

function createPowerup(x, y) {
  const types = ['shield', 'triple', 'star', 'life'];
  const weights = [3, 3, 3, 1];
  let r = Math.random() * weights.reduce((a,b)=>a+b,0), type;
  for (let i = 0; i < types.length; i++) {
    r -= weights[i];
    if (r <= 0) { type = types[i]; break; }
  }
  return { x, y, type, speed: 1.5, r: 12, anim: 0 };
}

// --- Input ---
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') e.preventDefault();
  if (e.code === 'KeyZ') e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('overlay').style.display = 'none';
  initGame();
  state = 'playing';
});

// --- Shoot ---
function shoot() {
  if (player.shootCooldown > 0) return;
  const cooldown = player.tripleShot > 0 ? 10 : 14;
  player.shootCooldown = cooldown;
  if (player.tripleShot > 0) {
    bullets.push({ x: player.x, y: player.y - 10, speed: 11, angle: -Math.PI/2 });
    bullets.push({ x: player.x - 14, y: player.y, speed: 11, angle: -Math.PI/2 - 0.18 });
    bullets.push({ x: player.x + 14, y: player.y, speed: 11, angle: -Math.PI/2 + 0.18 });
  } else {
    bullets.push({ x: player.x, y: player.y - 10, speed: 11, angle: -Math.PI/2 });
  }
}

// --- Particles ---
function explode(x, y, color, n = 18) {
  for (let i = 0; i < n; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 3 + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: Math.random() * 0.03 + 0.02,
      r: Math.random() * 3 + 1,
      color
    });
  }
}

// --- Level banner ---
function showLevelBanner(txt) {
  const el = document.getElementById('levelBanner');
  el.textContent = txt;
  el.style.opacity = '1';
  setTimeout(() => { el.style.opacity = '0'; }, 1800);
}

// --- HUD update ---
function updateHUD() {
  document.getElementById('scoreHud').textContent = `SCORE: ${score}`;
  document.getElementById('levelHud').textContent = `LEVEL: ${level}`;
  const h = document.getElementById('lives');
  h.textContent = '♥ '.repeat(lives).trim() || '☠';
  h.style.color = lives <= 1 ? '#f00' : '#f55';
}

// --- Game Over overlay ---
function showGameOver() {
  if (score > bestScore) bestScore = score;
  const ov = document.getElementById('overlay');
  ov.innerHTML = `
    <h1>GAME<br>OVER</h1>
    <div class="score-display">SCORE: ${score}</div>
    <div class="best-display">MEJOR: ${bestScore}</div>
    <button id="retryBtn">REINTENTAR</button>
  `;
  ov.style.display = 'flex';
  document.getElementById('retryBtn').addEventListener('click', () => {
    ov.style.display = 'none';
    initGame();
    state = 'playing';
  });
}

// --- Draw helpers ---
function drawStars() {
  stars.forEach(s => {
    s.y += s.speed * (state === 'playing' ? 1 : 0.3);
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
    ctx.globalAlpha = s.alpha;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawPlayer() {
  const p = player;
  ctx.save();
  ctx.translate(p.x, p.y);

  // Shield bubble
  if (p.shield > 0) {
    const alpha = Math.min(1, p.shield / 60) * 0.5;
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = '#0ff';
    ctx.lineWidth = 3;
    ctx.shadowColor = '#0ff';
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.arc(0, 0, 32, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  }

  // Invincibility flash
  if (p.invincible > 0 && Math.floor(p.invincible / 4) % 2 === 0) {
    ctx.restore();
    return;
  }

  // Thruster flame
  p.thrusterAnim = (p.thrusterAnim + 0.3) % (Math.PI * 2);
  const flameH = 14 + Math.sin(p.thrusterAnim) * 5;
  const grad = ctx.createLinearGradient(0, 10, 0, 10 + flameH);
  grad.addColorStop(0, '#ff8800');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(-8, 10);
  ctx.lineTo(8, 10);
  ctx.lineTo(0, 10 + flameH);
  ctx.closePath();
  ctx.fill();

  // Ship body
  ctx.fillStyle = '#0cf';
  ctx.shadowColor = '#0cf';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.moveTo(0, -19);
  ctx.lineTo(20, 14);
  ctx.lineTo(10, 8);
  ctx.lineTo(-10, 8);
  ctx.lineTo(-20, 14);
  ctx.closePath();
  ctx.fill();

  // Cockpit
  ctx.fillStyle = '#fff';
  ctx.shadowBlur = 0;
  ctx.beginPath();
  ctx.ellipse(0, -4, 5, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  // Triple shot indicator
  if (p.tripleShot > 0) {
    ctx.fillStyle = `rgba(255,100,0,${0.4 + 0.3 * Math.sin(frameCount * 0.2)})`;
    ctx.beginPath();
    ctx.arc(0, 0, 24, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

function drawMeteor(m) {
  ctx.save();
  ctx.translate(m.x, m.y);
  ctx.rotate(m.rot);
  ctx.fillStyle = m.color;
  ctx.shadowColor = m.color;
  ctx.shadowBlur = 6;
  ctx.beginPath();
  // Irregular polygon
  const sides = 7;
  for (let i = 0; i < sides; i++) {
    const angle = (i / sides) * Math.PI * 2;
    const jitter = m.r * (0.75 + 0.25 * Math.sin(i * 3.7));
    const px = Math.cos(angle) * jitter;
    const py = Math.sin(angle) * jitter;
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fill();
  // Crack lines for big meteors
  if (m.r > 30) {
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-m.r * 0.3, -m.r * 0.2);
    ctx.lineTo(m.r * 0.2, m.r * 0.3);
    ctx.stroke();
  }
  ctx.restore();
}

function drawBullet(b) {
  ctx.save();
  ctx.translate(b.x, b.y);
  ctx.rotate(b.angle + Math.PI / 2);
  const g = ctx.createLinearGradient(0, -10, 0, 4);
  g.addColorStop(0, '#ff0');
  g.addColorStop(1, 'transparent');
  ctx.fillStyle = g;
  ctx.shadowColor = '#ff0';
  ctx.shadowBlur = 8;
  ctx.fillRect(-2, -10, 4, 14);
  ctx.restore();
}

const POWERUP_COLORS = { shield: '#0ff', triple: '#f80', star: '#ff0', life: '#f55' };
const POWERUP_ICONS  = { shield: '🛡', triple: '🔥', star: '⭐', life: '♥' };

function drawPowerup(pw) {
  pw.anim += 0.05;
  ctx.save();
  ctx.translate(pw.x, pw.y + Math.sin(pw.anim) * 4);
  const c = POWERUP_COLORS[pw.type];
  ctx.shadowColor = c;
  ctx.shadowBlur = 14;
  ctx.strokeStyle = c;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, 0, pw.r, 0, Math.PI * 2);
  ctx.stroke();
  ctx.font = '14px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(POWERUP_ICONS[pw.type], 0, 1);
  ctx.restore();
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// --- Update ---
function update() {
  frameCount++;
  const p = player;

  // Move player
  if (keys['ArrowLeft'] || keys['KeyA']) p.x = Math.max(p.w / 2, p.x - p.speed);
  if (keys['ArrowRight'] || keys['KeyD']) p.x = Math.min(W - p.w / 2, p.x + p.speed);
  if (keys['Space'] || keys['KeyZ']) shoot();

  if (p.shootCooldown > 0) p.shootCooldown--;
  if (p.shield > 0) p.shield--;
  if (p.tripleShot > 0) p.tripleShot--;
  if (p.invincible > 0) p.invincible--;

  // Bullets
  bullets = bullets.filter(b => {
    b.x += Math.cos(b.angle) * b.speed;
    b.y += Math.sin(b.angle) * b.speed;
    return b.y > -20 && b.y < H + 20 && b.x > -20 && b.x < W + 20;
  });

  // Meteors
  meteors.forEach(m => {
    m.y += m.speed;
    m.rot += m.rotSpeed;
    if (m.y > H + m.r) {
      Object.assign(m, createMeteor(false));
    }
  });

  // Bullet-meteor collisions
  bullets = bullets.filter(b => {
    let hit = false;
    meteors = meteors.filter(m => {
      if (hit) return true;
      const dx = b.x - m.x, dy = b.y - m.y;
      if (Math.sqrt(dx*dx + dy*dy) < m.r + 4) {
        m.hp--;
        hit = true;
        explode(m.x, m.y, m.color, 10);
        if (m.hp <= 0) {
          score += m.r > 32 ? 20 : 10;
          explode(m.x, m.y, m.color, 22);
          // Chance to drop powerup
          if (Math.random() < 0.18) powerups.push(createPowerup(m.x, m.y));
          meteors.push(createMeteor());
          return false;
        }
        return true;
      }
      return true;
    });
    return !hit;
  });

  // Player-meteor collision
  if (p.invincible === 0) {
    meteors.forEach(m => {
      const dx = p.x - m.x, dy = p.y - m.y;
      if (Math.sqrt(dx*dx + dy*dy) < m.r + 16) {
        if (p.shield > 0) {
          p.shield = 0;
          explode(p.x, p.y, '#0ff', 20);
          p.invincible = 60;
        } else {
          lives--;
          explode(p.x, p.y, '#f55', 30);
          p.invincible = 90;
          if (lives <= 0) {
            state = 'gameover';
            showGameOver();
          }
        }
      }
    });
  }

  // Powerups
  powerups = powerups.filter(pw => {
    pw.y += pw.speed;
    if (pw.y > H + pw.r) return false;
    const dx = p.x - pw.x, dy = p.y - pw.y;
    if (Math.sqrt(dx*dx + dy*dy) < pw.r + 18) {
      applyPowerup(pw.type);
      return false;
    }
    return true;
  });

  // Particles
  particles = particles.filter(pt => {
    pt.x += pt.vx; pt.y += pt.vy;
    pt.life -= pt.decay;
    return pt.life > 0;
  });

  // Level up
  const nextLevel = Math.floor(score / 150) + 1;
  if (nextLevel > level) {
    level = nextLevel;
    showLevelBanner(`⬆ NIVEL ${level}`);
    spawnMeteors(2);
  }

  updateHUD();
}

function applyPowerup(type) {
  if (type === 'shield')  { player.shield = 300; explode(player.x, player.y, '#0ff', 15); }
  if (type === 'triple')  { player.tripleShot = 300; explode(player.x, player.y, '#f80', 15); }
  if (type === 'star')    { score += 50; explode(player.x, player.y, '#ff0', 20); }
  if (type === 'life')    { lives = Math.min(5, lives + 1); explode(player.x, player.y, '#f55', 15); }
}

// --- Draw ---
function draw() {
  ctx.fillStyle = '#05050f';
  ctx.fillRect(0, 0, W, H);
  drawStars();
  if (state !== 'playing') return;
  powerups.forEach(drawPowerup);
  meteors.forEach(drawMeteor);
  bullets.forEach(drawBullet);
  drawParticles();
  drawPlayer();

  // Shield bar
  if (player.shield > 0) {
    const bw = 80, bh = 5;
    const bx = player.x - bw / 2, by = player.y + 26;
    ctx.fillStyle = '#111';
    ctx.fillRect(bx, by, bw, bh);
    ctx.fillStyle = '#0ff';
    ctx.fillRect(bx, by, bw * (player.shield / 300), bh);
  }
  // Triple shot bar
  if (player.tripleShot > 0) {
    const bw = 80, bh = 4;
    const bx = player.x - bw / 2, by = player.y + 33;
    ctx.fillStyle = '#111';
    ctx.fillRect(bx, by, bw, bh);
    ctx.fillStyle = '#f80';
    ctx.fillRect(bx, by, bw * (player.tripleShot / 300), bh);
  }
}

// --- Loop ---
function loop() {
  if (state === 'playing') update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
